name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege. Widen per-job only if a job genuinely needs to write.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend · test
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to immutable commit SHAs, not moving tags:
      # a tag can be repointed at malicious code after review.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # The `test` profile uses in-memory H2 and no Redis, so CI needs no services
      # and no secrets. See backend/src/main/resources/application.yml.
      - name: Run tests
        working-directory: backend
        run: ./gradlew test --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test

  frontend:
    name: frontend · typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      # `pnpm build` runs `tsc -b` first, so this typechecks too.
      - name: Typecheck and build
        working-directory: frontend
        run: pnpm build

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # This repository is public. A leaked data.go.kr service key or LLM key is
      # scraped within minutes of being pushed.
      # GITLEAKS_LICENSE is only required for organization-owned repos, not personal ones.
      - name: Scan history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
