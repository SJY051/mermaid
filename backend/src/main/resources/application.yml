spring:
  application:
    name: mermaid-backend

  # Load the repo-root .env as a property source so ONE file feeds both
  # `docker compose` and Spring. Optional: the app still starts without it
  # (with empty keys) so `./gradlew test` works on a fresh clone and in CI.
  # The `../` form is for running from backend/, the `./` form for the repo root.
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:./.env[.properties]

  datasource:
    url: jdbc:mariadb://localhost:3306/${MARIADB_DATABASE:mermaid}
    username: ${MARIADB_USER:mermaid}
    password: ${MARIADB_PASSWORD:mermaid}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    # Flyway owns the schema. JPA only checks that entities match it.
    # Never set this to `update` — it silently drifts from the migrations,
    # and our ERD deliverable is generated from the migrations.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      # Public API responses change slowly. 6h keeps us far under the
      # 1,000/day pharmacy quota during a 5-person dev day.
      time-to-live: 6h
      cache-null-values: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.mermaid: DEBUG

# ---------------------------------------------------------------
# mermAid-specific configuration. Bound to typed @ConfigurationProperties
# classes (LlmProperties, PublicApiProperties) — never read via @Value.
# ---------------------------------------------------------------
mermaid:
  # live    — call the real APIs; a provider failure is an error the user sees
  # hybrid  — call them, fall back to fixtures on failure, and label the data as such
  # fixture — never touch the network (reproducible demos, CI, and the 1,000/day quota)
  data-mode: ${DATA_MODE:hybrid}
  llm:
    # Any OpenAI-compatible endpoint. See .env.example.
    #
    # The default model is glm-5.2 because it is one of the few on this endpoint that
    # honours `response_format: {type: json_schema, strict: true}` — verified 2026-07-10,
    # including oneOf/$defs/const/format. deepseek-v4-* and qwen3.7-max answer 400 to any
    # response_format at all; minimax-m3 accepts it and returns <think> prose anyway.
    # StructuredOutputFallback exists precisely because that second class of model exists.
    base-url: ${LLM_BASE_URL:https://opencode.ai/zen/go/v1}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:glm-5.2}
    # Pass 2 of the RAG flow writes a whole MermAidAnswer over three grounded drugs. Measured against
    # glm-5.2 on opencode zen, 2026-07-10: ~14s for a small context, past 60s for a real one, and the
    # SAME warm request took 215s then 87s minutes apart. The provider's latency, not ours — but two
    # serial calls per turn doubles our exposure to it. Sixty seconds sat exactly on the boundary, so
    # the same question answered or 500'd depending on the cache.
    timeout: ${LLM_TIMEOUT:120s}
    # Pass 1a returns two short arrays. Giving it the same budget as a full answer means a queued
    # provider can burn three minutes before we even start retrieving. On timeout the drug context is
    # empty, so the answer names no medicine and says to visit a pharmacy — degraded, never wrong.
    extraction-timeout: ${LLM_EXTRACTION_TIMEOUT:30s}

  public-api:
    # IMPORTANT: this must be the DECODING key from data.go.kr.
    # See PublicApiUriBuilder for why, and .env.example for the trap.
    service-key: ${DATA_GO_KR_SERVICE_KEY:}

    # 국립중앙의료원 전국 약국 정보 조회 서비스 (data.go.kr 15000576)
    # NOTE: getParmacyLcinfoInqire has NO radius param. We clip by distance ourselves.
    pharmacy-base-url: https://apis.data.go.kr/B552657/ErmctInsttInfoInqireService

    # 건강보험심사평가원 병원정보서비스 (data.go.kr 15001698) — has xPos/yPos/radius(m)
    hospital-base-url: https://apis.data.go.kr/B551182/hospInfoServicev2

    # 건강보험심사평가원 의료기관별상세정보서비스 (data.go.kr 15001699) — keyed by ykiho
    # TODO(team): confirm the live version suffix (2.7 vs 2.8) on data.go.kr before
    #             generating DTOs. See docs/specs/001-foundation/spec.md §3.
    hospital-detail-base-url: https://apis.data.go.kr/B551182/MadmDtlInfoService2.8

    # 식약처 의약품개요정보 e약은요 (data.go.kr 15075057) — narrative text, NO ingredients
    # NOTE: this one uses `type=json`, not `_type=json`.
    easy-drug-base-url: https://apis.data.go.kr/1471000/DrbEasyDrugInfoService

    # 식약처 의약품 제품 허가정보 (data.go.kr 15095677) — structured ingredients (FR-04)
    # Verified 2026-07-10:
    #   list   = getDrugPrdtPrmsnInq07   → ITEM_INGR_NAME (English, '/'-separated). Filter with
    #            `item_ingr_name=Acetaminophen` — ENGLISH, and CASE-SENSITIVE ('acetaminophen' → 0).
    #            It has NO item_seq parameter; passing one is silently ignored.
    #   detail = getDrugPrdtPrmsnDtlInq06 → MAIN_INGR_ENG, MAIN_ITEM_INGR ([M######]…). Note "06",
    #            not "07" — getDrugPrdtPrmsnDtlInq07 returns 404.
    drug-permission-base-url: https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07

    # 식약처 DUR 품목정보 (data.go.kr 15059486) — 병용/연령/임부 금기, 노인주의 (FR-07)
    # NOTE: also `type=json`. Its INGR_CODE (D-code) does NOT join to 허가정보's [M-code];
    #       join on ITEM_SEQ. See docs/specs/001-foundation/spec.md §2-10, §3.
    dur-base-url: https://apis.data.go.kr/1471000/DURPrdlstInfoService03

---
# Test profile: no external infra required.
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:mermaid;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  cache:
    type: simple

mermaid:
  data-mode: fixture
