# Local development infrastructure for mermAid.
#
#   docker compose up -d      # start MariaDB + Redis
#   docker compose down       # stop, keep data
#   docker compose down -v    # stop AND wipe data (use after editing a migration)
#
# Spring Boot does NOT start these automatically — that is deliberate.
# You run them, you can see them, you can debug them.
#
# Named volumes, not bind mounts to ./.data. `down -v` only removes named volumes,
# so with a bind mount the "wipe data" above would have been a lie — and editing an
# already-applied migration would greet you with a Flyway checksum mismatch you
# could not clear.

services:
  mariadb:
    image: mariadb:11.4
    container_name: mermaid-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-mermaid}
      MARIADB_USER: ${MARIADB_USER:-mermaid}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-mermaid}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: mermaid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  mariadb-data:
  redis-data:
